<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentaMovil – Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js"></script>
</head>
<body>

    <nav class="demo-nav">
        <button class="demo-tab active" onclick="showPage('splash', event)">Splash</button>
        <button class="demo-tab" onclick="showPage('login', event)">Login</button>
        <button class="demo-tab" onclick="showPage('register', event)">Registro</button>
    </nav>

    <section id="page-splash" class="page active">
        <div class="splash-screen">
            <div class="splash-content">
                <img src="assets/logo fijo proyecto.png" alt="RentaMovil Logo" class="main-logo-anim">
                <div class="loader-line"></div>
            </div>
        </div>
    </section>

    <section id="page-login" class="page">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <img src="assets/logo fijo proyecto.png" alt="Logo" class="form-logo">
                    <h2>¡Qué bueno verte!</h2>
                    <p>Ingresa para alquilar tu próximo vehículo.</p>
                </div>
                
                <form class="auth-form">
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" placeholder="ejemplo@correo.com">
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="••••••••">
                    </div>
                    <div class="form-options">
                        <label class="checkbox"><input type="checkbox"> Recordarme</label>
                        <a href="#" onclick="showPage('forgot')">¿Olvidaste tu clave?</a>
                    </div>
                    <button type="submit" class="btn-main">Iniciar Sesión</button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="#" onclick="showPage('register')">Regístrate aquí</a></p>
                </div>
            </div>
        </div>
    </section>

    <section id="page-register" class="page">
        <div class="auth-container">
            <div class="auth-box wide">
                <div class="auth-header">
                    <h2>Crea tu cuenta</h2>
                    <p>Únete a RentaMovil y conduce libre hoy mismo.</p>
                </div>
                
                <form class="auth-form grid-2">
                    <div class="input-group">
                        <label>Nombre</label>
                        <input type="text" placeholder="Ej. Juan">
                    </div>
                    <div class="input-group">
                        <label>Apellido</label>
                        <input type="text" placeholder="Ej. Pérez">
                    </div>
                    <div class="input-group col-span">
                        <label>Correo Electrónico</label>
                        <input type="email" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="input-group col-span">
                        <label>Contraseña</label>
                        <input type="password" placeholder="Mínimo 8 caracteres">
                    </div>
                    <button type="submit" class="btn-main col-span">Crear Cuenta</button>
                </form>
                
                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? <a href="#" onclick="showPage('login')">Inicia sesión</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
